<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VeriTree-GAKE Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 30px 40px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    header p {
      font-size: 13px;
      color: #666;
    }

    .content {
      padding: 40px;
    }

    .form-section {
      background: #fafafa;
      padding: 24px;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 16px;
      align-items: center;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    label {
      font-weight: 500;
      color: #444;
      font-size: 13px;
    }

    input[type="text"],
    input[type="number"] {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Monaco', 'Courier New', monospace;
      background: white;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: #333;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    button {
      padding: 10px 24px;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 500;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }

    button:hover {
      background: #1a1a1a;
    }

    button:active {
      background: #000;
    }

    #result {
      margin-top: 30px;
    }

    .summary-box {
      background: #fafafa;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 30px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 13px;
      align-items: flex-start;
    }

    .summary-row:last-child {
      margin-bottom: 0;
    }

    .summary-label {
      font-weight: 500;
      color: #555;
    }

    .summary-value {
      font-family: 'Monaco', 'Courier New', monospace;
      word-break: break-all;
      color: #333;
      background: white;
      padding: 8px 10px;
      border-radius: 4px;
      border: 1px solid #ddd;
      font-size: 12px;
    }

    .unanimous-true {
      color: #27a745;
      font-weight: 500;
    }

    .unanimous-false {
      color: #dc3545;
      font-weight: 500;
    }

    .role-section {
      margin-bottom: 30px;
    }

    .role-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      background: #f0f0f0;
      padding: 10px 12px;
      border-left: 3px solid #333;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .role-badge {
      display: inline-block;
      background: #e8e8e8;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      margin-left: auto;
    }

    .node-grid {
      display: grid;
      gap: 12px;
    }

    .node-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 14px;
      transition: all 0.2s;
    }

    .node-card:hover {
      border-color: #bbb;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    }

    .node-id {
      font-weight: 600;
      color: #1a1a1a;
      font-size: 13px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e8e8e8;
    }

    .node-values {
      display: grid;
      gap: 6px;
      font-size: 12px;
      font-family: 'Monaco', 'Courier New', monospace;
    }

    .node-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 10px;
      align-items: flex-start;
    }

    .node-label {
      font-weight: 500;
      color: #666;
      text-align: right;
    }

    .node-value {
      background: #fafafa;
      padding: 5px 8px;
      border-radius: 3px;
      word-break: break-all;
      color: #333;
      border: 1px solid #e8e8e8;
    }

    .loading {
      text-align: center;
      padding: 40px;
      font-size: 14px;
      color: #666;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e0e0e0;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: #f8f8f8;
      color: #d32f2f;
      padding: 14px;
      border-radius: 4px;
      border-left: 3px solid #d32f2f;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .error-title {
      font-weight: 600;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>VeriTree-GAKE Demo</h1>
      <p>Multi-KEM Group Authenticated Key Exchange Protocol</p>
    </header>

    <div class="content">
      <div class="form-section">
        <form id="demoForm">
          <div class="form-group">
            <label for="admin">Admin name:</label>
            <input type="text" id="admin" value="admin" placeholder="Enter admin name">
          </div>

          <div class="form-group">
            <label for="mods"># Moderators:</label>
            <input type="number" id="mods" value="2" min="1" max="10">
          </div>

          <div class="form-group">
            <label for="members"># Members per Moderator:</label>
            <input type="number" id="members" value="2" min="1" max="20">
          </div>

          <div class="form-group">
            <label for="kems">KEM families (comma-separated):</label>
            <input type="text" id="kems" value="Kyber-512,Saber-512" placeholder="e.g., Kyber-512,Saber-512">
          </div>

          <div class="button-group">
            <button type="button" onclick="runDemo()">Run Demo</button>
          </div>
        </form>
      </div>

      <div id="result"></div>
    </div>
  </div>

  <script>
    async function runDemo() {
      const admin = document.getElementById("admin").value;
      const mods = parseInt(document.getElementById("mods").value);
      const members = parseInt(document.getElementById("members").value);
      const kems = document
        .getElementById("kems")
        .value.split(",")
        .map((s) => s.trim());

      const resultEl = document.getElementById("result");
      resultEl.innerHTML = '<div class="loading"><span class="spinner"></span>Running demo...</div>';

      try {
        const response = await fetch("/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            admin_name: admin,
            n_moderators: mods,
            members_per_mod: members,
            kem_algs: kems,
          }),
        });

        const data = await response.json();

        if (data.error) {
          resultEl.innerHTML = `
            <div class="error">
              <div class="error-title">Error running demo:</div>
              ${data.error}
            </div>
          `;
          return;
        }
        const bandwidth = data.result.total_bytes;
        console.log(`Bandwidth: ${bandwidth} bytes (${data.result.bandwidth_kb} KB)`);
        console.log("Full Protocol Trace:", data.logs);

        resultEl.innerHTML = formatResult(data.result) + 
    `<div style="margin-top: 20px; padding: 15px; background: #f0f8ff; border-radius: 6px; font-family: monospace; font-size: 12px; white-space: pre-wrap; max-height: 400px; overflow-y: auto;">
        <strong>📋 Protocol Logs (${data.logs.length} chars):</strong><br><br>
        ${data.logs}
    </div>`;
      } catch (err) {
        console.error(err);
        resultEl.innerHTML = `
          <div class="error">
            <div class="error-title">Network Error:</div>
            ${err.message}
          </div>
        `;
      }
    }

    function formatResult(result) {
      const { unanimous, SK_hex, global_sid, total_bytes, bandwidth_kb, nodes } = result;
      
      // ADD BANDWIDTH TO SUMMARY
      return `
          <div class="summary-box">
              <div class="summary-row">
                  <div class="summary-label">Unanimous:</div>
                  <div class="summary-value ${unanimous ? 'unanimous-true' : 'unanimous-false'}">
                      ${unanimous ? 'Yes' : 'No'}
                  </div>
              </div>
              <div class="summary-row">
                  <div class="summary-label">Shared Key:</div>
                  <div class="summary-value">${SK_hex.slice(0,32)}...</div>
              </div>
              <div class="summary-row">
                  <div class="summary-label">Bandwidth:</div>
                  <div class="summary-value unanimous-true">${total_bytes} bytes (${bandwidth_kb} KB)</div>
              </div>
              <div class="summary-row">
                  <div class="summary-label">Global SID:</div>
                  <div class="summary-value">${global_sid.slice(0,32)}...</div>
              </div>
          </div>

          ${renderRoleSection("Admin", nodes)}
          ${renderRoleSection("Moderators", nodes)}
          ${renderRoleSection("Members", nodes)}
      `;
  }

    function renderRoleSection(title, nodes) {
      if (!nodes || Object.keys(nodes).length === 0) return "";

      const count = Object.keys(nodes).length;
      let nodesHtml = "";

      for (const [id, node] of Object.entries(nodes)) {
        nodesHtml += `
          <div class="node-card">
            <div class="node-id">${id}</div>
            <div class="node-values">
              <div class="node-row">
                <div class="node-label">tildeK:</div>
                <div class="node-value">${node.tildeK || ''}</div>
              </div>
              <div class="node-row">
                <div class="node-label">masked:</div>
                <div class="node-value">${node.masked || ''}</div>
              </div>
              <div class="node-row">
                <div class="node-label">mask:</div>
                <div class="node-value">${node.mask || ''}</div>
              </div>
              <div class="node-row">
                <div class="node-label">confirm:</div>
                <div class="node-value">${node.confirm || ''}</div>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="role-section">
          <div class="role-title">
            ${title}
            <span class="role-badge">${count}</span>
          </div>
          <div class="node-grid">
            ${nodesHtml}
          </div>
        </div>
      `;
    }

    window.runDemo = runDemo;
  </script>
</body>
</html>
